  sentinel-master:
    image: redis:7.2-alpine
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
      - --port
      - "6380"
    ports:
      - "6380:6380"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sentinel-replica1:
    image: redis:7.2-alpine
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
      - --port
      - "6381"
      - --replicaof
      - host.docker.internal
      - "6380"
    ports:
      - "6381:6381"
    depends_on:
      - sentinel-master
    extra_hosts:
      - "host.docker.internal:host-gateway"

